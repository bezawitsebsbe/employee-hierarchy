<div class="min-h-screen bg-gray-950 text-gray-100 flex flex-col">
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-tight">
      <span class="text-blue-500">Organization</span>Employee-Hierarchy
    </h1>
    <div class="flex items-center gap-4">
      <span class="text-gray-400 text-sm hidden sm:inline"
        >Welcome,{{ currentUserName || 'User' }}</span
      >
      <button
        class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 rounded-md transition-colors border border-gray-700"
      >
        Sign Out
      </button>
    </div>
  </header>

  <main class="flex-1 p-6">
    <div class="max-w-lg mx-auto bg-gray-900 rounded-xl p-8 border border-gray-800 shadow-2xl">
      <h2 class="text-3xl font-bold mb-8 text-center">Edit Position</h2>

      <form [formGroup]="positionForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Position Name *</label>
          <input
            formControlName="name"
            type="text"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-600"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Description</label>
          <textarea
            formControlName="description"
            rows="4"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-600"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Parent Position</label>
          <select
            formControlName="parentId"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-600"
          >
            <option [value]="null">None (Root level)</option>
            <option *ngFor="let p of parentPositions" [value]="p.id">{{ p.name }}</option>
          </select>
        </div>

        <div class="flex gap-4 mt-8">
          <button
            type="submit"
            class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors"
            [disabled]="positionForm.invalid"
          >
            Save Changes
          </button>
          <button
            type="button"
            (click)="goBack()"
            class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-lg transition-colors"
          >
            Cancel
          </button>
          <button
            type="button"
            (click)="onDelete()"
            class="flex-1 py-3 bg-red-700 hover:bg-red-600 text-white font-semibold rounded-lg transition-colors"
          >
            Delete
          </button>
        </div>
      </form>
    </div>
  </main>

  <footer class="py-6 text-center text-gray-600 text-sm border-t border-gray-800">
    © 2025 Organization Hierarchy • All rights reserved
  </footer>
</div>
<!-- Delete Modal -->
<div
  *ngIf="showDeleteModal"
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4"
>
  <div
    class="bg-gray-900 rounded-2xl p-8 max-w-lg w-full border border-red-900/50 shadow-2xl shadow-red-950/40"
  >
    <div class="flex flex-col items-center mb-6">
      <div class="w-16 h-16 rounded-full bg-red-900/30 flex items-center justify-center mb-5">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          ></path>
        </svg>
      </div>
      <h3 class="text-2xl font-bold text-red-400">Delete "{{ positionForm.value.name }}"?</h3>
      <p class="text-gray-400 text-center mt-3">This action is permanent and cannot be undone.</p>
    </div>

    <div class="flex gap-4">
      <button
        (click)="showDeleteModal = false"
        class="flex-1 py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-lg transition-colors"
      >
        Cancel
      </button>
      <button
        (click)="confirmDelete()"
        class="flex-1 py-3 bg-red-700 hover:bg-red-600 text-white font-medium rounded-lg transition-colors"
      >
        Delete Position
      </button>
    </div>
  </div>
</div>
